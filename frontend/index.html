<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Three-Tier DevOps To-Do App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <nav class="border-b border-slate-800 bg-slate-950/50 backdrop-blur px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-emerald-500/10 text-emerald-400 p-2 rounded-lg border border-emerald-500/20">
                <i class="fa-solid fa-layer-group text-xl animate-pulse"></i>
            </div>
            <div>
                <h1 class="font-bold tracking-tight text-lg">My Three-Tier DevOps To-Do App</h1>
                <p class="text-xs text-slate-500">Infrastructure Stack: <span class="text-cyan-400 font-medium">Docker Verified</span></p>
            </div>
        </div>
        <div class="flex items-center gap-4 text-xs text-slate-400 bg-slate-900 px-3 py-1.5 rounded-full border border-slate-800">
            <span><i class="fa-brands fa-docker text-cyan-400 mr-1"></i> Nginx + Node + Mongo</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <div class="bg-slate-950/40 border border-slate-800 rounded-2xl p-5 mb-8 flex flex-col md:flex-row gap-4 items-end shadow-lg">
            <div class="flex-1">
                <label class="text-xs font-semibold uppercase tracking-wider text-slate-400 block mb-2">
                    <i class="fa-solid fa-terminal text-cyan-400 mr-1"></i> Input New Task Deployment
                </label>
                <input type="text" id="taskInput" placeholder="e.g., Configure Jenkins Multi-branch Pipeline..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 text-slate-200 placeholder-slate-600 transition">
            </div>
            <button onclick="addTask()" class="bg-gradient-to-r from-cyan-500 to-indigo-500 hover:from-cyan-600 hover:to-indigo-600 text-white text-sm font-semibold px-6 py-3 rounded-xl transition-all shadow-lg shadow-cyan-500/10 active:scale-98 cursor-pointer flex items-center gap-2 h-11">
                <i class="fa-solid fa-plus text-xs"></i> Deploy Task
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-slate-950/20 border border-slate-800/80 rounded-2xl p-6 shadow-md">
                <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                    <h3 class="font-bold text-sm uppercase tracking-wider text-amber-400 flex items-center gap-2">
                        <i class="fa-solid fa-spinner animate-spin text-xs"></i> Active Pipeline Nodes
                    </h3>
                    <span id="activeCount" class="text-xs bg-amber-500/10 text-amber-400 px-2 py-0.5 rounded-full font-mono border border-amber-500/20">0</span>
                </div>
                <ul id="activeList" class="space-y-3 min-h-[150px]"></ul>
                <div id="activeEmpty" class="text-center py-8 text-slate-600 text-xs border border-dashed border-slate-800 rounded-xl hidden">
                    All tasks completed! Infrastructure stable.
                </div>
            </div>

            <div class="bg-slate-950/20 border border-slate-800/80 rounded-2xl p-6 shadow-md">
                <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                    <h3 class="font-bold text-sm uppercase tracking-wider text-emerald-400 flex items-center gap-2">
                        <i class="fa-solid fa-circle-check text-xs"></i> Completed Logs (Data Tier)
                    </h3>
                    <span id="completedCount" class="text-xs bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-full font-mono border border-emerald-500/20">0</span>
                </div>
                <ul id="completedList" class="space-y-3 min-h-[150px]"></ul>
                <div id="completedEmpty" class="text-center py-8 text-slate-600 text-xs border border-dashed border-slate-800 rounded-xl hidden">
                    No logs archived yet.
                </div>
            </div>

        </div>
    </main>

    <script>
        const API_URL = window.location.origin.includes('localhost') 
    ? 'http://localhost:5000/tasks' 
    : '/api/tasks';

        async function loadTasks() {
            try {
                const res = await fetch(API_URL);
                const tasks = await res.json();
                
                const activeList = document.getElementById('activeList');
                const completedList = document.getElementById('completedList');
                
                const activeEmpty = document.getElementById('activeEmpty');
                const completedEmpty = document.getElementById('completedEmpty');
                
                let activeCount = 0;
                let completedCount = 0;

                activeList.innerHTML = '';
                completedList.innerHTML = '';

                tasks.forEach(t => {
                    if (!t.completed) {
                        activeCount++;
                        activeList.innerHTML += `
                            <li class="bg-slate-900 border border-slate-800 rounded-xl px-4 py-3.5 flex justify-between items-center hover:border-amber-500/40 transition duration-300 group">
                                <span class="text-sm font-mono text-slate-300">${t.title}</span>
                                <button onclick="toggleTask('${t._id}', true)" class="text-xs font-semibold bg-slate-950 hover:bg-amber-500 hover:text-slate-950 text-amber-400 px-3 py-1.5 rounded-lg border border-amber-500/20 transition-all cursor-pointer flex items-center gap-1">
                                    <i class="fa-solid fa-check"></i> Complete
                                </button>
                            </li>
                        `;
                    } else {
                        completedCount++;
                        completedList.innerHTML += `
                            <li class="bg-slate-950/60 border border-slate-900 rounded-xl px-4 py-3.5 flex justify-between items-center opacity-60 hover:opacity-100 transition duration-300">
                                <span class="text-sm font-mono text-slate-400 line-through">${t.title}</span>
                                <span class="text-[10px] uppercase font-mono tracking-wider text-emerald-400 bg-emerald-500/10 px-2.5 py-1 rounded border border-emerald-500/20">
                                    <i class="fa-solid fa-box-archive mr-1"></i> Archived
                                </span>
                            </li>
                        `;
                    }
                });

                document.getElementById('activeCount').innerText = activeCount;
                document.getElementById('completedCount').innerText = completedCount;

                if(activeCount === 0) activeEmpty.classList.remove('hidden'); else activeEmpty.classList.add('hidden');
                if(completedCount === 0) completedEmpty.classList.remove('hidden'); else completedEmpty.classList.add('hidden');

            } catch (err) { console.log("Error loading tasks:", err); }
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value.trim()) return;
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: input.value.trim() })
                });
                input.value = '';
                loadTasks();
            } catch (err) { console.log("Error adding task:", err); }
        }

        async function toggleTask(id, currentStatus) {
            try {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: currentStatus })
                });
                loadTasks();
            } catch (err) { console.log("Error updating task:", err); }
        }

        loadTasks();
    </script>
</body>
</html>
